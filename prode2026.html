<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Totalitos — Mundial 2026</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #e8a020;
    --accent2: #c0392b;
    --text: #f0f0f0;
    --muted: #888;
    --green: #27ae60;
    --radius: 6px;
    --font-mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a0a00 0%, #2d1200 50%, #1a0a00 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-ball { font-size: 32px; }
  .header-title { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .content { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  /* RANKING */
  .ranking-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .rank-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .rank-card.pos1 { border-color: #f0c040; background: linear-gradient(135deg, #1a1400, #1f1900); }
  .rank-card.pos2 { border-color: #a0a8b0; background: linear-gradient(135deg, #111418, #161a1e); }
  .rank-card.pos3 { border-color: #b06030; background: linear-gradient(135deg, #140e08, #1a1208); }
  .rank-pos { font-size: 28px; font-weight: 900; color: var(--border); position: absolute; top: 8px; right: 12px; font-family: var(--font-mono); }
  .rank-pos.p1 { color: #f0c040; }
  .rank-pos.p2 { color: #a0a8b0; }
  .rank-pos.p3 { color: #b06030; }
  .rank-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .rank-pts { font-size: 28px; font-weight: 900; color: var(--accent); font-family: var(--font-mono); }
  .rank-pts span { font-size: 13px; color: var(--muted); font-weight: 400; }
  .rank-detail { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* MATCHES TABLE */
  .day-block { margin-bottom: 20px; }
  .day-header {
    background: var(--accent2);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: var(--radius) var(--radius) 0 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  table.matches {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  table.matches th {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    background: var(--surface2);
  }
  table.matches th.left { text-align: left; }
  table.matches td {
    padding: 8px 10px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  table.matches tr:last-child td { border-bottom: none; }
  table.matches td.match-name { text-align: left; font-weight: 600; min-width: 160px; }
  table.matches td.match-name .teams { font-size: 12px; }
  table.matches td.match-name .local { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .result-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 700;
    font-family: var(--font-mono);
    min-width: 28px;
    text-align: center;
  }
  .result-L { background: #1a3a1a; color: #4ec94e; }
  .result-E { background: #1a1a3a; color: #7090ff; }
  .result-V { background: #3a1a1a; color: #ff7060; }
  .result-? { background: var(--border); color: var(--muted); }

  /* result selector */
  .result-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    min-width: 60px;
  }
  .result-select:focus { outline: 2px solid var(--accent); }

  /* hit indicators */
  .hit { color: var(--green); font-weight: 700; }
  .miss { color: var(--accent2); }
  .pending { color: var(--muted); }

  /* PRONOSTICOS VIEW */
  .prono-table-wrap { overflow-x: auto; }
  table.prono {
    border-collapse: collapse;
    font-size: 12px;
    min-width: 800px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table.prono th {
    background: var(--surface2);
    color: var(--muted);
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  table.prono td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  table.prono td.partido {
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
    background: var(--surface2);
    position: sticky;
    left: 0;
    z-index: 1;
  }
  table.prono td.result-real {
    background: var(--surface2);
  }

  /* BUTTONS */
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: 0.15s;
  }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { background: #f0b030; }
  .btn-secondary { background: transparent; color: var(--muted); border-color: var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  /* Section titles */
  .section-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* badge */
  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    margin-left: 6px;
  }
  .badge.live { background: #1a3010; color: #4fc040; border-color: #4fc040; }

  /* Info note */
  .info-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    border-radius: var(--radius);
    margin-bottom: 20px;
  }

  /* MODAL ADMIN */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 10px; padding: 28px 32px; width: 100%; max-width: 340px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .modal h3 { color: var(--accent); font-size: 16px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .modal input[type=password] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; padding: 10px 12px;
    border-radius: var(--radius); outline: none; margin-bottom: 12px;
    letter-spacing: 3px;
  }
  .modal input[type=password]:focus { border-color: var(--accent); }
  .modal-error { color: var(--accent2); font-size: 12px; margin-bottom: 10px; display:none; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .admin-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 1px solid var(--border); transition: 0.15s;
  }
  .admin-badge.locked { background: var(--surface2); color: var(--muted); }
  .admin-badge.locked:hover { border-color: var(--accent); color: var(--accent); }
  .admin-badge.unlocked { background: #0d2a18; color: var(--green); border-color: var(--green); }
  .tab-locked { opacity: 0.45; cursor: not-allowed !important; }
  .tab-locked::after { content: ' 🔒'; font-size: 10px; }
  .part-list { display: flex; flex-direction: column; gap: 8px; max-width: 560px; }
  .part-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
  }
  .part-row:hover { border-color: var(--accent); }
  .part-num { font-size: 12px; color: var(--muted); font-family: var(--font-mono); min-width: 20px; }
  .part-name-input {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 14px; font-weight: 600; outline: none; font-family: inherit;
    border-bottom: 1px solid transparent; transition: border-color 0.15s;
  }
  .part-name-input:focus { border-bottom-color: var(--accent); }
  .part-name-input.changed { border-bottom-color: #f0c040; color: #f0c040; }
  .part-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer;
    transition: 0.15s;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--muted); }
  .btn-icon.save { border-color: var(--green); color: var(--green); }
  .btn-icon.save:hover { background: #0d2a18; }
  .btn-icon.danger:hover { border-color: var(--accent2); color: var(--accent2); }
  /* ESTADÍSTICAS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; font-weight: 700; }
  .stat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .stat-bar-label { font-size: 12px; min-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-bar-track { flex: 1; background: var(--border); border-radius: 3px; height: 8px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .stat-bar-val { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; font-family: var(--font-mono); }
  .stat-big { font-size: 32px; font-weight: 900; color: var(--accent); font-family: var(--font-mono); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stat-kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-kpi-val { font-size: 26px; font-weight: 900; color: var(--accent); font-family: var(--font-mono); }
  .stat-kpi-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .streak-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; margin-left: 6px; }
  .streak-hot { background: #2d1000; color: #ff7040; border: 1px solid #ff7040; }
  .streak-cold { background: #001020; color: #4080ff; border: 1px solid #4080ff; }
  table.stat-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.stat-table th { color: var(--muted); font-size: 11px; padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left; font-weight: 600; }
  table.stat-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  table.stat-table tr:last-child td { border-bottom: none; }
  table.stat-table td.num { text-align: right; font-family: var(--font-mono); color: var(--accent); font-weight: 700; }
  .no-data-note { color: var(--muted); font-size: 13px; text-align: center; padding: 32px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }

  .result-anulado { background: #1a1a1a; color: #555; font-size:11px; padding:3px 8px; border-radius:3px; border:1px solid #333; font-style:italic; }
  tr.anulado-row td { opacity:0.45; }
  tr.anulado-row td.match-name { opacity:1; }

    font-size: 11px; font-weight: 700; padding: 2px 4px;
    border-radius: 3px; cursor: pointer; font-family: var(--font-mono);

  }
  .prono-edit-select:focus { outline: none; }
    margin-top: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .changes-note { font-size: 12px; color: #f0c040; }

  @media (max-width: 600px) {
    .content { padding: 12px; }
    .ranking-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

// =============================================
// SCORING
// =============================================
function calcularPuntos() {
  const puntos = {};
  const aciertos = {};
  const pendientes = {};
  PARTICIPANTES.forEach(p => { puntos[p.id] = 0; aciertos[p.id] = 0; pendientes[p.id] = 0; });

  PARTIDOS.forEach(partido => {
    if (partido.anulado) return; // ignorar anulados
    if (!partido.resultado_real) {
      PARTICIPANTES.forEach(p => pendientes[p.id]++);
      return;
    }
    PARTICIPANTES.forEach(p => {
      const prono = partido.pronosticos[p.id];
      if (prono === partido.resultado_real) {
        puntos[p.id]++;
        aciertos[p.id]++;
      }
    });
  });

  return PARTICIPANTES.map(p => ({
    ...p,
    puntos: puntos[p.id],
    aciertos: aciertos[p.id],
    pendientes: pendientes[p.id],
  })).sort((a, b) => b.puntos - a.puntos);
}

// =============================================
// ADMIN AUTH
// =============================================
const ADMIN_KEY = 'zapala';
let isAdmin = false;

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    updateAdminUI();
  } else {
    document.getElementById('modal-admin').classList.add('open');
    setTimeout(() => document.getElementById('admin-pwd-input').focus(), 50);
  }
}

function closeAdminModal() {
  document.getElementById('modal-admin').classList.remove('open');
  document.getElementById('admin-pwd-input').value = '';
  document.getElementById('admin-error').style.display = 'none';
}

function checkAdmin() {
  const val = document.getElementById('admin-pwd-input').value.trim().toLowerCase();
  if (val === ADMIN_KEY) {
    isAdmin = true;
    closeAdminModal();
    updateAdminUI();
    // si está en tab bloqueada, re-renderizar
    if (currentTab === 'partidos') renderPartidos();
    if (currentTab === 'participantes') renderParticipantes();
  } else {
    document.getElementById('admin-error').style.display = 'block';
    document.getElementById('admin-pwd-input').value = '';
    document.getElementById('admin-pwd-input').focus();
  }
}

function updateAdminUI() {
  const badge = document.getElementById('admin-badge');
  const label = document.getElementById('admin-label');
  if (isAdmin) {
    badge.className = 'admin-badge unlocked';
    label.textContent = 'Admin activo · click para cerrar';
  } else {
    badge.className = 'admin-badge locked';
    label.textContent = 'Admin';
  }
  // tabs bloqueadas
  document.querySelectorAll('.tab[data-tab="partidos"], .tab[data-tab="participantes"]').forEach(t => {
    t.classList.toggle('tab-locked', !isAdmin);

function renderRanking() {

  const totalPozo = PARTICIPANTES.length * 30000;

  html += `<div class="info-note">⚽ ${totalJugados} / ${totalPartidos} partidos cargados · 1 punto por acierto · Pozo total: $${pozoFmt} · Un solo ganador</div>`;
  html += `<div class="ranking-grid">`;

  ranked.forEach((p, i) => {
    const posClass = i === 0 ? 'pos1' : i === 1 ? 'pos2' : i === 2 ? 'pos3' : '';

      <div class="rank-pos ${posNumClass}">${i+1}</div>
      <div class="rank-name">${p.nombre}</div>

  document.getElementById('tab-ranking').innerHTML = html;
}

async function setPronosticoDirecto(partidoId, participanteId, valor) {
  if (!isAdmin) return;

  partido.pronosticos[participanteId] = valor;
  await sbUpsert('prode_pronosticos', [{ partido_id: partidoId, participante_id: participanteId, valor }]);
  renderRanking();
}

async function setResultado(pid, valor) {
  const p = PARTIDOS.find(x => x.id === pid);
  if (p) {
    p.resultado_real = valor || null;
    await saveResultados();
    renderRanking();
  }
}

function renderPronosticos() {
  const ranked = calcularPuntos();
  const pidOrder = ranked.map(p => p.id);
  const hayDudas = PARTIDOS.some(p => p.dudas && p.dudas.length);

  let html = `<div class="section-title">📋 Grilla de pronósticos</div>`;
  if (hayDudas) {
    html += `<div class="info-note" style="border-left-color:#f0c040">⚠ Los pronósticos marcados en <span style="color:#f0c040;font-weight:700">amarillo</span> tienen dudas de lectura — verificar contra planilla física.${isAdmin ? ' Hacé click en el valor para corregirlo.' : ' Iniciá sesión como admin para corregirlos.'}</div>`;
  }

  html += `<div class="prono-table-wrap"><table class="prono"><thead><tr>
    <th class="partido">Partido</th>
    <th>Real</th>`;

  pidOrder.forEach(pid => {
    const p = ranked.find(x => x.id === pid);
    const pos = ranked.indexOf(p) + 1;
    html += `<th title="${p.nombre}">${pos}. ${p.nombre.split(' ')[0]}<br><span style="color:var(--accent)">${p.puntos}pt</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  const fechas = [...new Set(PARTIDOS.map(p => p.fecha))];
  fechas.forEach(fecha => {
    html += `<tr><td colspan="${2 + pidOrder.length}" style="background:#1a0800;color:var(--accent);font-weight:700;font-size:11px;padding:6px 10px;text-transform:uppercase;">${fecha}</td></tr>`;
    PARTIDOS.filter(p => p.fecha === fecha).forEach(partido => {
      const r = partido.resultado_real;
      const isAnulado = partido.anulado;
      const dudas = partido.dudas || [];

      if (isAnulado) {
        html += `<tr class="anulado-row">
          <td class="partido" style="color:#e05555">🚫 ${partido.local} v ${partido.visitante}</td>
          <td class="result-real"><span class="result-anulado">Anulado</span></td>`;
        pidOrder.forEach(() => { html += '<td style="color:#444;text-align:center">—</td>'; });
        html += '</tr>';
        return;
      }

      pidOrder.forEach(pid => {
        const prono = partido.pronosticos[pid];
        const esDuda = dudas.includes(pid);
        let cls = 'pending';
        if (r && prono === r) cls = 'hit';
        else if (r && prono !== r) cls = 'miss';
        const icon = r ? (prono === r ? '✓' : '✗') : '';

        if (esDuda && isAdmin) {
          // Admin: selector editable
          html += `<td style="background:#1a1200;padding:2px 4px;">
            <select class="prono-edit-select" onchange="setPronostico('${partido.id}','${pid}',this.value)" title="⚠ Duda — editá el valor">
              <option value="L" ${prono==='L'?'selected':''}>L</option>
              <option value="E" ${prono==='E'?'selected':''}>E</option>
              <option value="V" ${prono==='V'?'selected':''}>V</option>
            </select>
            <span style="font-size:9px;color:#f0c040">⚠</span>
          </td>`;
        } else if (esDuda) {
          // Solo lectura con marca visual
          html += `<td class="${cls}" style="background:#1a1200;" title="⚠ Duda — requiere verificación">
            <span class="result-badge result-${prono}" style="border:1px solid #f0c040">${prono}</span>
            <span style="font-size:9px;color:#f0c040">⚠</span>
            ${icon ? `<span style="font-size:11px">${icon}</span>` : ''}
          </td>`;
        } else {
          html += `<td class="${cls}"><span class="result-badge result-${prono}">${prono}</span> <span style="font-size:11px">${icon}</span></td>`;
        }
      });
      html += `</tr>`;
    });
  });

  html += `</tbody></table></div>`;
  document.getElementById('tab-pronosticos').innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onNombreInput(input) {
  const original = input.dataset.original;
  const changed = input.value !== original;
  input.classList.toggle('changed', changed);
  const btn = document.getElementById('pbtn-' + input.dataset.pid);
  if (btn) btn.style.display = changed ? '' : 'none';
  document.getElementById('changes-note').style.display = 'inline';
}

function saveNombre(pid) {
  const input = document.getElementById('pinput-' + pid);
  if (!input) return;
  const nuevo = input.value.trim();
  if (!nuevo) { input.value = input.dataset.original; return; }
  const p = PARTICIPANTES.find(x => x.id === pid);
  if (p) {
    p.nombre = nuevo;
    input.dataset.original = nuevo;
    input.classList.remove('changed');
    const btn = document.getElementById('pbtn-' + pid);
    if (btn) btn.style.display = 'none';
    saveNombres();
    document.getElementById('changes-note').textContent = '✓ Guardado';
    document.getElementById('changes-note').style.color = 'var(--green)';
    document.getElementById('changes-note').style.display = 'inline';
    setTimeout(() => {
      const note = document.getElementById('changes-note');
      if (note) { note.style.display = 'none'; note.style.color = '#f0c040'; note.textContent = '⚠ Hay cambios sin guardar'; }
    }, 2000);
  }
}

function resetNombre(pid) {
  const input = document.getElementById('pinput-' + pid);
  if (!input) return;
  input.value = input.dataset.original;
  input.classList.remove('changed');
  const btn = document.getElementById('pbtn-' + pid);
  if (btn) btn.style.display = 'none';
}

function saveAllNombres() {
  PARTICIPANTES.forEach(p => {
    const input = document.getElementById('pinput-' + p.id);
    if (input && input.value.trim()) {
      p.nombre = input.value.trim();
      input.dataset.original = p.nombre;
      input.classList.remove('changed');
      const btn = document.getElementById('pbtn-' + p.id);
      if (btn) btn.style.display = 'none';
    }
  });
  saveNombres();
  const note = document.getElementById('changes-note');
  if (note) {
    note.textContent = '✓ Todos guardados';
    note.style.color = 'var(--green)';
    note.style.display = 'inline';
    setTimeout(() => { note.style.display = 'none'; note.style.color = '#f0c040'; note.textContent = '⚠ Hay cambios sin guardar'; }, 2000);
  }
}

// =============================================
// RENDER: ESTADÍSTICAS
// =============================================
function renderStats() {
  const jugados = PARTIDOS.filter(p => !p.anulado && p.resultado_real);
  const total = PARTIDOS.filter(p => !p.anulado).length;
  const locales = jugados.filter(p => p.resultado_real === 'L').length;
  const empates = jugados.filter(p => p.resultado_real === 'E').length;
  const visitantes = jugados.filter(p => p.resultado_real === 'V').length;
  const n = jugados.length;

  if (n === 0) {
    document.getElementById('tab-stats').innerHTML =
      '<div class="section-title">📊 Estadísticas</div><div class="no-data-note">⏳ Aún no hay resultados cargados. Las estadísticas aparecen automáticamente a medida que se juegan los partidos.</div>';
    return;
  }

  const ranked = calcularPuntos();

  // ── 1. Tendencia de resultados (L/E/V %)
  const pctL = n ? Math.round(locales/n*100) : 0;
  const pctE = n ? Math.round(empates/n*100) : 0;
  const pctV = n ? Math.round(visitantes/n*100) : 0;

  // ── 2. Acierto por participante
  const pctAcierto = ranked.map(p => ({
    nombre: p.nombre,
    pct: n ? Math.round(p.aciertos/n*100) : 0,
    aciertos: p.aciertos,
  })).sort((a,b) => b.pct - a.pct);

  // ── 3. Mejor racha activa por participante
  function calcRacha(pid) {
    const resultadosJugados = jugados; // ya ordenados por posición en array
    let rachaAct = 0, rachaMej = 0, rachaActSign = 0;
    for (const p of resultadosJugados) {
      if (p.pronosticos[pid] === p.resultado_real) {
        rachaAct++; if (rachaAct > rachaMej) rachaMej = rachaAct;
      } else { rachaAct = 0; }
    }
    rachaActSign = rachaAct;
    // racha actual de fallos
    let rachaFallo = 0;
    for (let i = resultadosJugados.length-1; i >= 0; i--) {
      if (resultadosJugados[i].pronosticos[pid] !== resultadosJugados[i].resultado_real) rachaFallo++;
      else break;
    }
    return { mejor: rachaMej, activa: rachaActSign, fallos: rachaFallo };
  }

  const rachas = ranked.map(p => ({ nombre: p.nombre, id: p.id, ...calcRacha(p.id) }));
  const mejorRacha = [...rachas].sort((a,b) => b.mejor - a.mejor)[0];
  const rachaMasActiva = [...rachas].filter(r => r.activa > 0).sort((a,b) => b.activa - a.activa)[0];
  const peorRacha = [...rachas].sort((a,b) => b.fallos - a.fallos)[0];

  // ── 4. Partido más acertado / menos acertado
  const aciertoPorPartido = jugados.map(p => {
    const ok = PARTICIPANTES.filter(part => p.pronosticos[part.id] === p.resultado_real).length;
    return { label: p.local + ' vs ' + p.visitante, ok, total: PARTICIPANTES.length, pct: Math.round(ok/PARTICIPANTES.length*100) };
  }).sort((a,b) => b.pct - a.pct);
  const masAcertado = aciertoPorPartido[0];
  const menosAcertado = aciertoPorPartido[aciertoPorPartido.length-1];

  // ── 5. Quién apostó más a local / visitante / empate
  function contarTipo(pid, tipo) {
    return PARTIDOS.filter(p => !p.anulado && p.pronosticos[pid] === tipo).length;
  }
  const masLocal = ranked.map(p => ({ nombre: p.nombre, n: contarTipo(p.id, 'L') })).sort((a,b) => b.n-a.n)[0];
  const masVisit = ranked.map(p => ({ nombre: p.nombre, n: contarTipo(p.id, 'V') })).sort((a,b) => b.n-a.n)[0];
  const masEmpate = ranked.map(p => ({ nombre: p.nombre, n: contarTipo(p.id, 'E') })).sort((a,b) => b.n-a.n)[0];

  // ── 6. % acierto por tipo de resultado
  function aciertoPorTipo(tipo) {
    const partsTipo = jugados.filter(p => p.resultado_real === tipo);
    if (!partsTipo.length) return 0;
    const totalOk = partsTipo.reduce((acc, p) => {
      return acc + PARTICIPANTES.filter(part => p.pronosticos[part.id] === tipo).length;
    }, 0);
    return Math.round(totalOk / (partsTipo.length * PARTICIPANTES.length) * 100);
  }
  const pctAciertoL = aciertoPorTipo('L');
  const pctAciertoE = aciertoPorTipo('E');
  const pctAciertoV = aciertoPorTipo('V');

  // ── 7. Sorpresómetro: partidos donde NADIE acertó
  const nadieAcerto = jugados.filter(p => {
    return PARTICIPANTES.every(part => p.pronosticos[part.id] !== p.resultado_real);
  });
  // Partidos donde TODOS acertaron
  const todosAcertaron = jugados.filter(p => {
    return PARTICIPANTES.every(part => p.pronosticos[part.id] === p.resultado_real);
  });

  // ── RENDER ──
  let html = '<div class="section-title">📊 Estadísticas del Prode <span class="badge live">● LIVE</span></div>';

  // KPIs
  html += '<div class="stat-kpi-grid">';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + n + '/' + total + '</div><div class="stat-kpi-lbl">Partidos jugados</div></div>';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + pctL + '%</div><div class="stat-kpi-lbl">Gana local</div></div>';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + pctV + '%</div><div class="stat-kpi-lbl">Gana visitante</div></div>';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + pctE + '%</div><div class="stat-kpi-lbl">Empates</div></div>';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + nadieAcerto.length + '</div><div class="stat-kpi-lbl">Sorpresas (nadie acertó)</div></div>';
  html += '<div class="stat-kpi"><div class="stat-kpi-val">' + todosAcertaron.length + '</div><div class="stat-kpi-lbl">Partidos unánimes ✓</div></div>';
  html += '</div>';

  html += '<div class="stats-grid">';

  // Distribución L/E/V
  html += '<div class="stat-card"><div class="stat-card-title">⚽ Distribución de resultados</div>';
  const barData = [
    { lbl: 'Local gana', val: locales, pct: pctL, color: '#27ae60' },
    { lbl: 'Visitante gana', val: visitantes, pct: pctV, color: '#e74c3c' },
    { lbl: 'Empate', val: empates, pct: pctE, color: '#3498db' },
  ];
  barData.forEach(function(b) {
    html += '<div class="stat-bar-row"><span class="stat-bar-label">' + b.lbl + '</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + b.pct + '%;background:' + b.color + '"></div></div><span class="stat-bar-val">' + b.val + ' (' + b.pct + '%)</span></div>';
  });
  html += '</div>';

  // Acierto por participante
  html += '<div class="stat-card"><div class="stat-card-title">🎯 % Acierto por participante</div>';
  const maxPct = pctAcierto[0] ? pctAcierto[0].pct : 100;
  pctAcierto.forEach(function(p) {
    const w = maxPct > 0 ? Math.round(p.pct / maxPct * 100) : 0;
    html += '<div class="stat-bar-row"><span class="stat-bar-label">' + p.nombre.split(' ')[0] + '</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + w + '%;background:#e8a020"></div></div><span class="stat-bar-val">' + p.aciertos + '/' + n + ' (' + p.pct + '%)</span></div>';
  });
  html += '</div>';

  // Rachas
  html += '<div class="stat-card"><div class="stat-card-title">🔥 Rachas</div>';
  html += '<table class="stat-table"><thead><tr><th>Participante</th><th>Mejor racha</th><th>Activa</th></tr></thead><tbody>';
  rachas.sort((a,b) => b.mejor - a.mejor).forEach(function(r) {
    const actBadge = r.activa >= 3 ? '<span class="streak-badge streak-hot">🔥 ' + r.activa + '</span>' :
                     r.fallos >= 3 ? '<span class="streak-badge streak-cold">🧊 -' + r.fallos + '</span>' :
                     r.activa > 0 ? '<span style="color:var(--green)">+' + r.activa + '</span>' :
                     r.fallos > 0 ? '<span style="color:var(--muted)">-' + r.fallos + '</span>' : '—';
    html += '<tr><td>' + r.nombre.split(' ')[0] + '</td><td class="num">' + r.mejor + '</td><td>' + actBadge + '</td></tr>';
  });
  html += '</tbody></table></div>';

  // Quién apuesta qué
  html += '<div class="stat-card"><div class="stat-card-title">📐 Estilo de pronóstico (total)</div>';
  html += '<table class="stat-table"><thead><tr><th>Participante</th><th>Local</th><th>Visita</th><th>Empate</th></tr></thead><tbody>';
  ranked.forEach(function(p) {
    const nL = contarTipo(p.id, 'L');
    const nV = contarTipo(p.id, 'V');
    const nE = contarTipo(p.id, 'E');
    html += '<tr><td>' + p.nombre.split(' ')[0] + '</td><td class="num">' + nL + '</td><td class="num">' + nV + '</td><td class="num">' + nE + '</td></tr>';
  });
  html += '</tbody></table></div>';

  // Acierto por tipo de resultado
  html += '<div class="stat-card"><div class="stat-card-title">🧠 Eficiencia por tipo de resultado</div>';
  const tipoData = [
    { lbl: 'Cuando gana local', pct: pctAciertoL, color: '#27ae60' },
    { lbl: 'Cuando gana visitante', pct: pctAciertoV, color: '#e74c3c' },
    { lbl: 'Cuando hay empate', pct: pctAciertoE, color: '#3498db' },
  ];
  tipoData.forEach(function(b) {
    html += '<div class="stat-bar-row"><span class="stat-bar-label">' + b.lbl + '</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + b.pct + '%;background:' + b.color + '"></div></div><span class="stat-bar-val">' + b.pct + '%</span></div>';
  });
  html += '<div style="font-size:11px;color:var(--muted);margin-top:8px">% de participantes que acertaron cuando ese resultado ocurrió</div>';
  html += '</div>';

  // Partidos más y menos acertados
  html += '<div class="stat-card"><div class="stat-card-title">🎪 Partidos más recordados</div>';
  html += '<table class="stat-table"><thead><tr><th>Partido</th><th>Acertaron</th></tr></thead><tbody>';
  aciertoPorPartido.slice(0,5).forEach(function(p) {
    html += '<tr><td>' + p.label + '</td><td class="num">' + p.ok + '/' + p.total + '</td></tr>';
  });
  html += '</tbody></table>';
  if (menosAcertado && menosAcertado.pct < 30) {
    html += '<div style="margin-top:10px;font-size:11px;color:var(--muted)">💀 Sorpresa máxima: <strong style="color:var(--text)">' + menosAcertado.label + '</strong> — solo ' + menosAcertado.ok + '/' + menosAcertado.total + ' acertaron</div>';
  }
  html += '</div>';

  // Nadie acertó
  if (nadieAcerto.length > 0) {
    html += '<div class="stat-card"><div class="stat-card-title">💀 Sorpresas absolutas (nadie acertó)</div>';
    html += '<table class="stat-table"><thead><tr><th>Partido</th><th>Resultado</th></tr></thead><tbody>';
    nadieAcerto.forEach(function(p) {
      const res = p.resultado_real === 'L' ? p.local : p.resultado_real === 'V' ? p.visitante : 'Empate';
      html += '<tr><td>' + p.local + ' vs ' + p.visitante + '</td><td class="num">' + res + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Todos acertaron
  if (todosAcertaron.length > 0) {
    html += '<div class="stat-card"><div class="stat-card-title">✅ Unanimidad total (todos acertaron)</div>';
    html += '<table class="stat-table"><thead><tr><th>Partido</th><th>Resultado</th></tr></thead><tbody>';
    todosAcertaron.forEach(function(p) {
      const res = p.resultado_real === 'L' ? p.local : p.resultado_real === 'V' ? p.visitante : 'Empate';
      html += '<tr><td>' + p.local + ' vs ' + p.visitante + '</td><td class="num">' + res + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  html += '</div>'; // cierre stats-grid

  // Curiosidades
  html += '<div class="section-title" style="margin-top:8px">🔍 Curiosidades</div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-card-title">👑 Highlights</div>';
  html += '<table class="stat-table"><tbody>';
  if (mejorRacha) html += '<tr><td>Mejor racha histórica</td><td class="num">' + mejorRacha.mejor + ' seguidos — ' + mejorRacha.nombre.split(' ')[0] + '</td></tr>';
  if (rachaMasActiva) html += '<tr><td>Racha activa más larga</td><td class="num">🔥 ' + rachaMasActiva.activa + ' — ' + rachaMasActiva.nombre.split(' ')[0] + '</td></tr>';
  if (peorRacha && peorRacha.fallos >= 2) html += '<tr><td>Racha de fallos activa</td><td class="num">🧊 ' + peorRacha.fallos + ' — ' + peorRacha.nombre.split(' ')[0] + '</td></tr>';
  html += '<tr><td>Más apuesta a local</td><td class="num">' + masLocal.nombre.split(' ')[0] + ' (' + masLocal.n + ' partidos)</td></tr>';
  html += '<tr><td>Más apuesta a visitante</td><td class="num">' + masVisit.nombre.split(' ')[0] + ' (' + masVisit.n + ' partidos)</td></tr>';
  html += '<tr><td>Más empates pronosticados</td><td class="num">' + masEmpate.nombre.split(' ')[0] + ' (' + masEmpate.n + ' partidos)</td></tr>';
  if (masAcertado) html += '<tr><td>Partido más fácil</td><td class="num">' + masAcertado.label.split(' vs ')[0] + ' vs ' + masAcertado.label.split(' vs ')[1] + ' (' + masAcertado.pct + '%)</td></tr>';
  html += '</tbody></table></div>';
  html += '</div>';

  document.getElementById('tab-stats').innerHTML = html;
}
let currentTab = 'ranking';

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    const tab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = tab;
    document.querySelectorAll('[id^="tab-"]').forEach(x => x.style.display = 'none');
    document.getElementById('tab-' + tab).style.display = '';
    if (tab === 'ranking') renderRanking();
    else if (tab === 'partidos') renderPartidos();
    else if (tab === 'pronosticos') renderPronosticos();
    else if (tab === 'stats') renderStats();
    else if (tab === 'participantes') renderParticipantes();
  });
});

// init: marcar tabs locked
document.querySelectorAll('.tab[data-tab="partidos"], .tab[data-tab="participantes"]').forEach(t => t.classList.add('tab-locked'));

// =============================================
// EXPORT CSV
// =============================================
function exportCSV() {
  const ranked = calcularPuntos();
  const headers = ['Partido','Fecha','Local','Visitante','Resultado Real', ...ranked.map(p => p.nombre)];
  const rows = [headers.join(',')];
  PARTIDOS.forEach(p => {
    const row = [p.id, p.fecha, p.local, p.visitante, p.resultado_real || 'pendiente',
      ...ranked.map(r => p.pronosticos[r.id] || '')
    ];
    rows.push(row.join(','));
  });
  rows.push('');
  rows.push(['RANKING', ...ranked.map(r => r.nombre)].join(','));
  rows.push(['PUNTOS', ...ranked.map(r => r.puntos)].join(','));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'prode2026.csv'; a.click();
}

loadFromSupabase();
